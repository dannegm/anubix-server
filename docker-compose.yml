version: "3.9"
services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: anubix
      POSTGRES_PASSWORD: anubix
      POSTGRES_DB: anubix
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
